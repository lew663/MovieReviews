<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원 가입</title>
</head>
<body>
<h1>회원 가입</h1>

<!-- Fragment include 예시 (파일 경로 및 fragment 이름 확인 필요) -->
<div th:replace="~{/fragments/layout.html :: layout-body-menu}"></div>

<!-- 회원 가입 폼 -->
<form action="/member/register" method="post">
  <label for="userId">아이디(이메일) 입력:</label>
  <input type="email" id="userId" name="userId" required> <br>

  <label for="userPassword">비밀번호 입력:</label>
  <input type="password" id="userPassword" name="userPassword" required> <br>

  <label for="userNickname">닉네임 입력:</label>
  <input type="text" id="userNickname" name="userNickname" required> <br>

  <label for="userPhone">전화번호 입력:</label>
  <input type="tel" id="userPhone" name="userPhone" required> <br>

  <label for="userName">이름 입력:</label>
  <input type="text" id="userName" name="userName" required> <br>

  <div>
    <button type="submit">회원 가입 하기</button>
  </div>
</form>
</body>
</html>
